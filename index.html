        <script>

            (() => {

            const overlay = document.getElementById("vx-overlay");
            const closeBtn = document.getElementById("vx-close");
            overlay.classList.remove("vx-show");
            const form = document.getElementById("vx-form");
            const success = document.getElementById("vx-success");

            const STORAGE_KEY = "virtuose_popup_seen";

            let popupArmed = false;
            let pageLoaded = false;

            window.addEventListener("load", () => {
              setTimeout(() => {
                pageLoaded = true;
              }, 1000);
            });
              // só permite popup depois de 20 segundos
            setTimeout(() => {
              popupArmed = true;
            }, 20000);

            const openPopup = () => {

              // não abre antes do tempo
              if(!popupArmed) return;

              if(localStorage.getItem(STORAGE_KEY)) return;

              overlay.classList.remove("vx-show");

              localStorage.setItem(STORAGE_KEY,"1");

            };

            const closePopup = () => {
              overlay.classList.add("vx-show");
            };

            closeBtn.addEventListener("click", closePopup);

            overlay.addEventListener("click", (e)=>{

            if(e.target===overlay) closePopup();

            });

          // ===== ARM (só depois de X ms e depois do load) =====
            let armed = false;

            // garante que só arma depois que a página terminou de carregar
            window.addEventListener("load", () => {
              setTimeout(() => { armed = true; }, 20000); // 20s (seu delay)
            });

            document.addEventListener("mouseout", (e) => {
              if (!armed) return;

              const toEl = e.relatedTarget || e.toElement;
              if (toEl) return;        // ainda está dentro da página
              if (e.clientY > 0) return; // não saiu pelo topo

              openPopup();
            });

            form.addEventListener("submit",async(e)=>{

            e.preventDefault();

            const data=new FormData(form);

            await fetch("/",{

            method:"POST",

            body:new URLSearchParams(data)

            });

            success.classList.remove("vx-hidden");

            document.getElementById("vx-download").classList.remove("vx-hidden");
           // setTimeout(closePopup, 2500);


            });

            })();

            
           
        </script>
    <script>

    let popupArmed = false;

    setTimeout(() => {
      popupArmed = true;
    }, 20000); // 20s


    document.addEventListener("mousemove", (e) => {

      if (!popupArmed) return;

      if (e.clientY <= 5) {

        const popup = document.querySelector('[role="dialog"]');

        if (popup && popup.dataset.customTriggered) return;

        if (popup){
          popup.dataset.customTriggered = "1";
          popup.style.display = "flex";
        }

      }

    });

    </script>
