  <script>

    let popupArmed = false;

    setTimeout(() => {
      popupArmed = true;
    }, 20000); // 20s


    document.addEventListener("mousemove", (e) => {

      if (!popupArmed) return;

      if (e.clientY <= 5) {

        const popup = document.querySelector('[role="dialog"]');

        if (popup && popup.dataset.customTriggered) return;

        if (popup){
          popup.dataset.customTriggered = "1";
          popup.style.display = "flex";
        }

      }

    });

    </script>
    
    <form name="virtuose_exit_lead" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="virtuose_exit_lead" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="whatsapp" />
    </form>

    <script>
    (() => {
      const PDF_URL = "/assets/ebook/guia_virtuose.pdf";
      const FORM_NAME = "virtuose_exit_lead";
      const SENT_KEY = "virtuose_exit_lead_sent_v1";

      const sentAlready = () => localStorage.getItem(SENT_KEY) === "1";
      const markSent = () => localStorage.setItem(SENT_KEY, "1");

      function findPopupForm() {
        const dialog = document.querySelector('[role="dialog"]');
        if (!dialog) return null;

        // tenta achar inputs comuns
        const emailInput = dialog.querySelector('input[type="email"], input[name*="email" i], input[placeholder*="mail" i]');
        if (!emailInput) return null;

        const form = emailInput.closest("form") || dialog.querySelector("form");
        if (!form) return null;

        // tenta achar nome/whatsapp se existirem (não quebra se não achar)
        const nameInput = dialog.querySelector('input[name*="name" i], input[placeholder*="nome" i]');
        const waInput = dialog.querySelector('input[type="tel"], input[name*="whats" i], input[placeholder*="whats" i]');

        return { dialog, form, emailInput, nameInput, waInput };
      }

      async function sendToNetlify(payload) {
        const data = new URLSearchParams();
        data.append("form-name", FORM_NAME);

        Object.entries(payload).forEach(([k, v]) => {
          if (v) data.append(k, v);
        });

        await fetch("/", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: data.toString()
        });
      }

      function attachHandler() {
        const found = findPopupForm();
        if (!found) return false;

        const { dialog, form, emailInput, nameInput, waInput } = found;

        if (form.dataset.virtuoseHooked === "1") return true;
        form.dataset.virtuoseHooked = "1";

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = (emailInput.value || "").trim();
          if (!email) return;

          const name = nameInput ? (nameInput.value || "").trim() : "";
          const whatsapp = waInput ? (waInput.value || "").trim() : "";

          // envia só uma vez por visitante (pra não duplicar)
          if (!sentAlready()) {
            try {
              await sendToNetlify({ name, email, whatsapp });
              markSent();
            } catch (err) {
              // se falhar, a gente ainda entrega o PDF pra não perder o lead
            }
          }

          // abre o PDF
          window.open(PDF_URL, "_blank", "noopener");

          // feedback simples dentro do popup
          let msg = dialog.querySelector("#virtuose-lead-msg");
          if (!msg) {
            msg = document.createElement("div");
            msg.id = "virtuose-lead-msg";
            msg.style.marginTop = "12px";
            msg.style.fontSize = "14px";
            msg.style.opacity = "0.9";
            msg.textContent = "Enviado ✅ Abrindo o PDF…";
            form.appendChild(msg);
          } else {
            msg.textContent = "Enviado ✅ Abrindo o PDF…";
          }

          // tenta fechar o popup (se houver botão de fechar)
          setTimeout(() => {
            const closeBtn =
              dialog.querySelector('button[aria-label*="fechar" i]') ||
              dialog.querySelector('button[aria-label*="close" i]') ||
              dialog.querySelector('button[type="button"]');
            if (closeBtn) closeBtn.click();
          }, 1200);
        });

        return true;
      }

      // o popup aparece depois, então observamos o DOM
      const obs = new MutationObserver(() => attachHandler());
      obs.observe(document.documentElement, { childList: true, subtree: true });

      // tenta já no início
      attachHandler();
    })();
    </script>
